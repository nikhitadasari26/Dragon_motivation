version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dragon_motivation_db
    restart: always
    environment:
      POSTGRES_USER: dragon
      POSTGRES_PASSWORD: motivation
      POSTGRES_DB: dragon_motivation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
